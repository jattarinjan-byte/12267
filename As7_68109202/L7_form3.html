<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>68105233 Assignment 7 - Space Fullscreen</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">
  
  <style>
    /* ทำให้ Body สูงเท่าหน้าจอพอดีและห้ามมี Scrollbar */
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden; /* ล็อกหน้าจอไม่ให้เลื่อนลง */
      font-family: 'Kanit', sans-serif;
    }

    /* พื้นหลังวิดีโอเต็มหน้าจอ */
    .video-background {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
      overflow: hidden;
    }

    .video-background video {
      min-width: 100%; 
      min-height: 100%;
      width: auto; height: auto;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.5); /* ปรับความมืด */
    }

    /* จัดวาง Form ให้อยู่กลางจอพอดี */
    .main-content {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .form-card {
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(0, 210, 255, 0.3);
      border-radius: 20px;
      padding: 30px;
      width: 100%;
      max-width: 500px; /* คุมความกว้างฟอร์ม */
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
      color: white;
    }

    .form-label { color: #00d2ff; margin-bottom: 2px; font-size: 0.9rem; }
    .form-control-sm, .form-select-sm { 
        background: rgba(255, 255, 255, 0.1); 
        border: 1px solid #444; 
        color: #fff; 
    }

    /* ปุ่มควบคุมวิดีโอ */
    .video-controls {
      position: absolute;
      bottom: 20px;
      right: 20px;
      z-index: 10;
    }

    .btn-control {
      background: rgba(0, 210, 255, 0.2);
      border: 1px solid #00d2ff;
      color: white;
      padding: 5px 15px;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-control:hover {
      background: #00d2ff;
      color: #000;
    }

    .btn-submit {
      background: linear-gradient(90deg, #00d2ff, #3a7bd5);
      border: none;
      color: white;
      font-weight: bold;
      margin-top: 15px;
    }
  </style>
</head>
<body>

  <div class="video-background">
    <video id="myVideo" autoplay muted loop playsinline>
      <source src="space.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>
  </div>

  <div class="video-controls">
    <button class="btn-control" onclick="playVid()">Play</button>
    <button class="btn-control" onclick="pauseVid()">Pause</button>
  </div>

  <div class="main-content">
    <div class="form-card">
      <h4 class="text-center mb-3">SPACE REGISTRATION</h4>
      <form>
        <div class="mb-2">
          <label class="form-label">ชื่อ-นามสกุล</label>
          <input type="text" class="form-control form-control-sm" placeholder="Full Name">
        </div>
        <div class="mb-2">
          <label class="form-label">อีเมล</label>
          <input type="email" class="form-control form-control-sm" placeholder="Email">
        </div>
        <div class="row mb-2">
          <div class="col">
            <label class="form-label">รหัสผ่าน</label>
            <input type="password" class="form-control form-control-sm">
          </div>
          <div class="col">
            <label class="form-label">ยืนยันรหัสผ่าน</label>
            <input type="password" class="form-control form-control-sm">
          </div>
        </div>
        <div class="mb-2">
          <label class="form-label d-block">เพศ</label>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="g" id="m">
            <label class="form-check-label" for="m">ชาย</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="g" id="f">
            <label class="form-check-label" for="f">หญิง</label>
          </div>
        </div>
        <div class="mb-2">
          <label class="form-label">แผนก</label>
          <select class="form-select form-select-sm">
            <option>Engineering</option>
            <option>Pilot</option>
          </select>
        </div>
        <button type="submit" class="btn btn-submit w-100">SUBMIT MISSION</button>
      </form>
    </div>
  </div>

  <script>
    var vid = document.getElementById("myVideo"); 

    function playVid() { 
      vid.play(); 
    } 

    function pauseVid() { 
      vid.pause(); 
    } 
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
